# ============================================================================
# Auto-Generated Apache Service Restart Automation
# ============================================================================
# Generated by: SMART (Systematic Mapping & Automation Runbook Transformer)
# Generated on: 2026-03-06 06:46:32
# Based on: Service Restart Runbook
#
# Service Request Information:
#   - Pattern: Service Restart
#   - Request ID: Service_Restart
#   - Description: Automated resolution for Service Restart based on service request runbook
#
# EXECUTION INSTRUCTIONS:
# 1. Update inventory file with target Apache servers
# 2. Set service_name variable: httpd (RHEL/CentOS) or apache2 (Debian/Ubuntu)
# 3. Dry run: ansible-playbook -i inventory service_restart.yml --check
# 4. Execute: ansible-playbook -i inventory service_restart.yml -e "service_name=httpd"
#
# IMPORTANT: Review this code before execution in production
# ============================================================================

---
- name: Apache Service Restart Automation
  hosts: all
  become: yes
  gather_facts: yes
  
  vars:
    service_name: "{{ service_name | default('httpd') }}"
    service_port: "{{ service_port | default(80) }}"
    max_restart_attempts: 3
    health_check_retries: 5
    health_check_delay: 10
    log_file: "/var/log/ansible_service_restart_{{ ansible_date_time.epoch }}.log"
  
  tasks:
    - name: Log automation start
      shell: |
        echo "=== Apache Service Restart Automation Started ===" >> {{ log_file }}
        echo "Timestamp: $(date)" >> {{ log_file }}
        echo "Service: {{ service_name }}" >> {{ log_file }}
        echo "Target Host: {{ ansible_hostname }}" >> {{ log_file }}
      changed_when: false
    
    - name: Check current Apache service status
      systemd:
        name: "{{ service_name }}"
      register: service_status
      ignore_errors: yes
    
    - name: Log current service status
      shell: echo "Current Status: {{ service_status.status.ActiveState | default('unknown') }}" >> {{ log_file }}
      changed_when: false
    
    - name: Detect Apache configuration file
      stat:
        path: "{{ item }}"
      register: config_check
      loop:
        - "/etc/httpd/conf/httpd.conf"
        - "/etc/apache2/apache2.conf"
      when: service_name in ['httpd', 'apache2']
    
    - name: Validate Apache configuration
      shell: |
        if command -v httpd &> /dev/null; then
          httpd -t
        elif command -v apache2ctl &> /dev/null; then
          apache2ctl -t
        fi
      register: config_test
      ignore_errors: yes
      when: service_name in ['httpd', 'apache2']
      changed_when: false
    
    - name: Log configuration validation result
      shell: |
        echo "Configuration Test: {{ 'PASSED' if config_test.rc == 0 else 'FAILED' }}" >> {{ log_file }}
        {% if config_test.stderr is defined %}
        echo "Details: {{ config_test.stderr }}" >> {{ log_file }}
        {% endif %}
      when: config_test is defined
      changed_when: false
    
    - name: Fail if configuration is invalid
      fail:
        msg: "Apache configuration validation failed. Please fix configuration errors before restart."
      when:
        - config_test is defined
        - config_test.rc != 0
    
    - name: Restart Apache service with retry logic
      systemd:
        name: "{{ service_name }}"
        state: restarted
        enabled: yes
      register: restart_result
      retries: "{{ max_restart_attempts }}"
      delay: 5
      until: restart_result is succeeded
    
    - name: Wait for service to be fully started
      wait_for:
        timeout: 30
      delegate_to: localhost
    
    - name: Verify Apache service is running
      systemd:
        name: "{{ service_name }}"
      register: final_status
      failed_when: final_status.status.ActiveState != 'active'
    
    - name: Check Apache port is listening
      wait_for:
        port: "{{ service_port }}"
        timeout: 30
        state: started
      when: service_port is defined
    
    - name: Perform HTTP health check
      uri:
        url: "http://localhost:{{ service_port }}"
        method: GET
        status_code: [200, 301, 302, 403]
      register: health_check
      retries: "{{ health_check_retries }}"
      delay: "{{ health_check_delay }}"
      until: health_check is succeeded
      when: service_name in ['httpd', 'apache2']
      ignore_errors: yes
    
    - name: Log final service status
      shell: |
        echo "=== Apache Service Restart Completed ===" >> {{ log_file }}
        echo "Final Status: {{ final_status.status.ActiveState }}" >> {{ log_file }}
        echo "Service is {{ 'HEALTHY' if health_check is succeeded else 'RUNNING' }}" >> {{ log_file }}
        echo "Completion Time: $(date)" >> {{ log_file }}
      changed_when: false
    
    - name: Display success message
      debug:
        msg: |
          ========================================
          Apache Service Restart - SUCCESS
          ========================================
          Service: {{ service_name }}
          Status: {{ final_status.status.ActiveState }}
          Port: {{ service_port }}
          Health Check: {{ 'PASSED' if health_check is succeeded else 'N/A' }}
          Log File: {{ log_file }}
          ========================================
  
  handlers:
    - name: reload apache
      systemd:
        name: "{{ service_name }}"
        state: reloaded
