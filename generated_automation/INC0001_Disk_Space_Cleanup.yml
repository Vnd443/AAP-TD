---
- name: Disk Space Cleanup for /var Partition - INC0001
  hosts: "{{ target_hosts | default('all') }}"
  become: yes
  gather_facts: yes
  
  vars:
    # Target partition for cleanup
    target_partition: "/var"
    # Threshold percentage to trigger cleanup
    disk_threshold: 95
    # Directories to clean
    cleanup_dirs:
      - path: "/var/log"
        pattern: "*.log.*"
        age: "+7"
      - path: "/var/log"
        pattern: "*.gz"
        age: "+14"
      - path: "/var/tmp"
        pattern: "*"
        age: "+10"
      - path: "/var/cache/apt/archives"
        pattern: "*.deb"
        age: "+30"
    # Log file location
    cleanup_log: "/var/log/ansible_disk_cleanup_{{ ansible_date_time.epoch }}.log"
    # Minimum free space required (in GB)
    min_free_space_gb: 2

  tasks:
    # Pre-flight checks
    - name: Check if target partition exists
      stat:
        path: "{{ target_partition }}"
      register: partition_check
      
    - name: Fail if partition does not exist
      fail:
        msg: "Target partition {{ target_partition }} does not exist"
      when: not partition_check.stat.exists

    # Get initial disk space
    - name: Get initial disk usage statistics
      shell: "df -h {{ target_partition }} | tail -1"
      register: initial_disk_usage
      changed_when: false
      check_mode: no

    - name: Parse initial disk usage percentage
      shell: "df {{ target_partition }} | tail -1 | awk '{print $5}' | sed 's/%//'"
      register: initial_usage_percent
      changed_when: false
      check_mode: no

    - name: Log initial disk status
      lineinfile:
        path: "{{ cleanup_log }}"
        line: "{{ ansible_date_time.iso8601 }} - Initial disk usage: {{ initial_disk_usage.stdout }}"
        create: yes
        mode: '0644'
      when: not ansible_check_mode

    - name: Display initial disk usage
      debug:
        msg: "Initial disk usage on {{ target_partition }}: {{ initial_usage_percent.stdout }}%"

    # Create backup list before cleanup
    - name: Create temporary directory for tracking
      tempfile:
        state: directory
        suffix: cleanup
      register: temp_tracking_dir
      when: not ansible_check_mode

    # Clean old log files
    - name: Find old compressed log files in /var/log
      find:
        paths: "{{ item.path }}"
        patterns: "{{ item.pattern }}"
        age: "{{ item.age }}"
        recurse: yes
      loop: "{{ cleanup_dirs }}"
      register: files_to_delete
      when: item.path is defined

    - name: Log files to be deleted
      copy:
        content: "{{ item.files | map(attribute='path') | join('\n') }}"
        dest: "{{ temp_tracking_dir.path }}/files_deleted_{{ ansible_date_time.epoch }}.txt"
      loop: "{{ files_to_delete.results }}"
      when: 
        - not ansible_check_mode
        - item.files is defined
        - item.files | length > 0
        - temp_tracking_dir.path is defined

    - name: Remove old log files (check mode compatible)
      file:
        path: "{{ item.1.path }}"
        state: absent
      loop: "{{ files_to_delete.results | subelements('files', skip_missing=True) }}"
      register: cleanup_results
      ignore_errors: yes

    # Clean package manager cache (Debian/Ubuntu)
    - name: Clean apt cache on Debian-based systems
      apt:
        autoclean: yes
        autoremove: yes
      when: 
        - ansible_os_family == "Debian"
        - not ansible_check_mode
      ignore_errors: yes

    # Clean package manager cache (RedHat/CentOS)
    - name: Clean yum cache on RedHat-based systems
      command: yum clean all
      when: 
        - ansible_os_family == "RedHat"
        - not ansible_check_mode
      changed_when: true
      ignore_errors: yes

    # Truncate large log files instead of deleting
    - name: Find large active log files (>100MB)
      find:
        paths: "/var/log"
        patterns: "*.log"
        size: "100m"
        recurse: yes
      register: large_logs

    - name: Truncate large active log files
      shell: "truncate -s 0 {{ item.path }}"
      loop: "{{ large_logs.files }}"
      when: 
        - large_logs.files | length > 0
        - not ansible_check_mode
      ignore_errors: yes
      register: truncate_results

    # Clean systemd journal logs
    - name: Clean systemd journal logs older than 7 days
      command: journalctl --vacuum-time=7d
      when: 
        - ansible_service_mgr == "systemd"
        - not ansible_check_mode
      changed_when: true
      ignore_errors: yes

    # Clean Docker resources if Docker is installed
    - name: Check if Docker is installed
      command: which docker
      register: docker_check
      failed_when: false
      changed_when: false
      check_mode: no

    - name: Clean Docker system (unused containers, images, volumes)
      command: docker system prune -af --volumes
      when: 
        - docker_check.rc == 0
        - not ansible_check_mode
      ignore_errors: yes
      changed_when: true

    # Post-cleanup validation
    - name: Get final disk usage statistics
      shell: "df -h {{ target_partition }} | tail -1"
      register: final_disk_usage
      changed_when: false
      check_mode: no

    - name: Parse final disk usage percentage
      shell: "df {{ target_partition }} | tail -1 | awk '{print $5}' | sed 's/%//'"
      register: final_usage_percent
      changed_when: false
      check_mode: no

    - name: Calculate space freed
      set_fact:
        space_freed: "{{ initial_usage_percent.stdout | int - final_usage_percent.stdout | int }}"

    - name: Log final disk status
      lineinfile:
        path: "{{ cleanup_log }}"
        line: "{{ ansible_date_time.iso8601 }} - Final disk usage: {{ final_disk_usage.stdout }} | Space freed: {{ space_freed }}%"
      when: not ansible_check_mode

    - name: Display cleanup results
      debug:
        msg: 
          - "Cleanup completed for {{ target_partition }}"
          - "Initial usage: {{ initial_usage_percent.stdout }}%"
          - "Final usage: {{ final_usage_percent.stdout }}%"
          - "Space freed: {{ space_freed }}%"

    # Verify disk space is below threshold
    - name: Verify disk usage is below threshold
      assert:
        that:
          - final_usage_percent.stdout | int < disk_threshold
        success_msg: "Disk usage ({{ final_usage_percent.stdout }}%) is now below threshold ({{ disk_threshold }}%)"
        fail_msg: "WARNING: Disk usage ({{ final_usage_percent.stdout }}%) still above threshold ({{ disk_threshold }}%). Manual intervention may be required."
      ignore_errors: yes

    # Alert if still above threshold
    - name: Set cleanup status
      set_fact:
        cleanup_successful: "{{ final_usage_percent.stdout | int < disk_threshold }}"

  handlers:
    - name: Send notification on failure
      debug:
        msg: "ALERT: Disk cleanup completed but usage still high on {{ inventory_hostname }}"
      when: not cleanup_successful | default(true)

  post_tasks:
    - name: Final status report
      debug:
        msg:
          - "=== Disk Cleanup Summary for INC0001 ==="
          - "Server: {{ inventory_hostname }}"
          - "Partition: {{ target_partition }}"
          - "Status: {{ 'SUCCESS' if cleanup_successful | default(true) else 'NEEDS ATTENTION' }}"
          - "Cleanup log: {{ cleanup_log }}"
